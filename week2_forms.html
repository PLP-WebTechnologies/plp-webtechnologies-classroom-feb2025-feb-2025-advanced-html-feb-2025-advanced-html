<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Multimedia Page</title>
</head>
<body>
    <h1>HTML5 Multimedia Page</h1>

    <!-- Audio -->
    <section>
        <h2>Audio Example</h2>
        <audio controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </section>

    <!-- Video -->
    <section>
        <h2>Video Example</h2>
        <video width="600" controls>
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
        </video>
    </section>

    <!-- Registration Form -->
    <section>
        <h2>Registration Form</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required minlength="3"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required minlength="8"><br><br>

            <input type="submit" value="Register">
        </form>
    </section>

    <!-- Image -->
    <section>
        <h2>Embedded Image</h2>
        <img src="https://picsum.photos/600/300" alt="Sample Image" width="600">
    </section>

    <!-- Table -->
    <section>
        <h2>Sample Table</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>City</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>John Maxwell</td>
                    <td>28</td>
                    <td>Mombasa</td>
                </tr>
                <tr>
                    <td>Jane Muthoni</td>
                    <td>22</td>
                    <td>Londiani</td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- Lists -->
    <section>
        <h2>ORDERED LISTS</h2>
        <ol type="1">
        <li>Alex</li>
        <li>Charity</li>  
        <li>Terence</li>   
        </ol> 
   <h2>UNORDERED LISTS</h2>
    <ul type="circle" >
        <li>Tomato</li>
        <li>Melon</li>
        <li>potato</li>
    </section>
</body>
</html>
